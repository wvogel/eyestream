<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="flame" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff5e1f"/>
      <stop offset="100%" stop-color="#ff9a22"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2250"/>
      <stop offset="100%" stop-color="#141450"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a7a42"/>
      <stop offset="100%" stop-color="#145a32"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="#f6f8fb"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#141450">Eyestream — Architektur</text>

  <!-- User -->
  <g transform="translate(60, 80)">
    <circle cx="30" cy="18" r="14" fill="none" stroke="#687395" stroke-width="1.5"/>
    <line x1="30" y1="32" x2="30" y2="52" stroke="#687395" stroke-width="1.5"/>
    <line x1="14" y1="40" x2="46" y2="40" stroke="#687395" stroke-width="1.5"/>
    <line x1="30" y1="52" x2="18" y2="68" stroke="#687395" stroke-width="1.5"/>
    <line x1="30" y1="52" x2="42" y2="68" stroke="#687395" stroke-width="1.5"/>
    <text x="30" y="84" text-anchor="middle" font-size="11" fill="#687395">Admin</text>
  </g>

  <!-- Website visitor -->
  <g transform="translate(60, 340)">
    <circle cx="30" cy="18" r="14" fill="none" stroke="#687395" stroke-width="1.5"/>
    <line x1="30" y1="32" x2="30" y2="52" stroke="#687395" stroke-width="1.5"/>
    <line x1="14" y1="40" x2="46" y2="40" stroke="#687395" stroke-width="1.5"/>
    <line x1="30" y1="52" x2="18" y2="68" stroke="#687395" stroke-width="1.5"/>
    <line x1="30" y1="52" x2="42" y2="68" stroke="#687395" stroke-width="1.5"/>
    <text x="30" y="84" text-anchor="middle" font-size="11" fill="#687395">Website /</text>
    <text x="30" y="96" text-anchor="middle" font-size="11" fill="#687395">Wiki</text>
  </g>

  <!-- OAuth2-Proxy -->
  <g filter="url(#shadow)">
    <rect x="180" y="80" width="160" height="70" rx="10" fill="url(#blue)"/>
    <text x="260" y="110" text-anchor="middle" font-size="12" font-weight="600" fill="#D4E4F0">OAuth2-Proxy</text>
    <text x="260" y="128" text-anchor="middle" font-size="9" fill="#8899bb">Entra-ID SSO</text>
  </g>

  <!-- App -->
  <g filter="url(#shadow)">
    <rect x="400" y="60" width="200" height="110" rx="10" fill="url(#blue)"/>
    <rect x="400" y="60" width="200" height="28" rx="10" fill="url(#flame)"/>
    <rect x="400" y="78" width="200" height="10" fill="url(#flame)"/>
    <text x="500" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">App (FastAPI)</text>
    <text x="500" y="102" text-anchor="middle" font-size="9" fill="#8899bb">video-admin.example.com</text>
    <text x="500" y="118" text-anchor="middle" font-size="9" fill="#8899bb">Upload, Verwaltung, API</text>
    <text x="500" y="134" text-anchor="middle" font-size="9" fill="#8899bb">SSE, Stats, Activity</text>
    <text x="500" y="150" text-anchor="middle" font-size="9" fill="#8899bb">Poster-Extraktion (ffmpeg)</text>
  </g>

  <!-- PostgreSQL -->
  <g filter="url(#shadow)">
    <rect x="680" y="80" width="160" height="70" rx="10" fill="url(#blue)"/>
    <text x="760" y="110" text-anchor="middle" font-size="12" font-weight="600" fill="#D4E4F0">PostgreSQL 18</text>
    <text x="760" y="128" text-anchor="middle" font-size="9" fill="#8899bb">Videos, Kategorien,</text>
    <text x="760" y="140" text-anchor="middle" font-size="9" fill="#8899bb">Activity, Heartbeat</text>
  </g>

  <!-- Worker -->
  <g filter="url(#shadow)">
    <rect x="680" y="220" width="160" height="90" rx="10" fill="url(#blue)"/>
    <rect x="680" y="220" width="160" height="28" rx="10" fill="url(#flame)"/>
    <rect x="680" y="238" width="160" height="10" fill="url(#flame)"/>
    <text x="760" y="242" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Worker</text>
    <text x="760" y="266" text-anchor="middle" font-size="9" fill="#8899bb">ffmpeg Encoding</text>
    <text x="760" y="280" text-anchor="middle" font-size="9" fill="#8899bb">Preview-Thumbnails</text>
    <text x="760" y="294" text-anchor="middle" font-size="9" fill="#8899bb">Heartbeat + CPU%</text>
  </g>

  <!-- Public Nginx -->
  <g filter="url(#shadow)">
    <rect x="320" y="340" width="220" height="110" rx="10" fill="url(#green)"/>
    <text x="430" y="370" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Public Nginx</text>
    <text x="430" y="390" text-anchor="middle" font-size="9" fill="#a0d8b0">video.example.com</text>
    <text x="430" y="408" text-anchor="middle" font-size="9" fill="#a0d8b0">HLS-Streaming (.m3u8 + .m4s)</text>
    <text x="430" y="422" text-anchor="middle" font-size="9" fill="#a0d8b0">Embed-Player + oEmbed</text>
    <text x="430" y="436" text-anchor="middle" font-size="9" fill="#a0d8b0">Poster + Preview-Thumbnails</text>
  </g>

  <!-- Shared Volume -->
  <g filter="url(#shadow)">
    <rect x="580" y="370" width="120" height="50" rx="8" fill="#eef3ff" stroke="#c0c8e0" stroke-width="1"/>
    <text x="640" y="393" text-anchor="middle" font-size="10" font-weight="600" fill="#3a3a7a">/data/hls</text>
    <text x="640" y="408" text-anchor="middle" font-size="8" fill="#687395">Shared Volume</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="720" y="370" width="120" height="50" rx="8" fill="#eef3ff" stroke="#c0c8e0" stroke-width="1"/>
    <text x="780" y="393" text-anchor="middle" font-size="10" font-weight="600" fill="#3a3a7a">/data/uploads</text>
    <text x="780" y="408" text-anchor="middle" font-size="8" fill="#687395">Shared Volume</text>
  </g>

  <!-- NPM Logs -->
  <g filter="url(#shadow)">
    <rect x="400" y="470" width="140" height="36" rx="8" fill="#eef3ff" stroke="#c0c8e0" stroke-width="1"/>
    <text x="470" y="492" text-anchor="middle" font-size="9" font-weight="600" fill="#3a3a7a">NPM Logs (ro)</text>
  </g>

  <!-- Arrows -->
  <!-- Admin -> OAuth2-Proxy -->
  <line x1="110" y1="115" x2="178" y2="115" stroke="#687395" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="145" y="108" text-anchor="middle" font-size="8" fill="#687395">HTTPS</text>

  <!-- OAuth2-Proxy -> App -->
  <line x1="340" y1="115" x2="398" y2="115" stroke="#687395" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="370" y="108" text-anchor="middle" font-size="8" fill="#687395">Auth</text>

  <!-- App -> PostgreSQL -->
  <line x1="600" y1="115" x2="678" y2="115" stroke="#687395" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="640" y="108" text-anchor="middle" font-size="8" fill="#687395">SQL</text>

  <!-- Worker -> PostgreSQL -->
  <line x1="760" y1="220" x2="760" y2="152" stroke="#687395" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="772" y="190" font-size="8" fill="#687395">SQL</text>

  <!-- App -> Shared Volume -->
  <line x1="520" y1="170" x2="520" y2="230" stroke="#ff9a22" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="520" y1="230" x2="640" y2="368" stroke="#ff9a22" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-flame)"/>
  <text x="555" y="285" font-size="8" fill="#b85c10">Poster, HLS</text>

  <!-- Worker -> Shared Volume hls -->
  <line x1="720" y1="310" x2="660" y2="368" stroke="#ff9a22" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead-flame)"/>
  <text x="705" y="345" font-size="8" fill="#b85c10">Encode</text>

  <!-- Worker -> Shared Volume uploads -->
  <line x1="780" y1="310" x2="780" y2="368" stroke="#687395" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="795" y="345" font-size="8" fill="#687395">Read</text>

  <!-- Public Nginx -> Shared Volume -->
  <line x1="540" y1="395" x2="578" y2="395" stroke="#1a7a42" stroke-width="1.5" marker-end="url(#arrowhead-green)"/>
  <text x="558" y="388" font-size="8" fill="#1a7a42">Serve</text>

  <!-- Website -> Public Nginx -->
  <line x1="110" y1="395" x2="318" y2="395" stroke="#1a7a42" stroke-width="1.5" marker-end="url(#arrowhead-green)"/>
  <text x="215" y="388" text-anchor="middle" font-size="8" fill="#1a7a42">HLS / Embed / oEmbed</text>

  <!-- App -> NPM Logs -->
  <line x1="470" y1="170" x2="470" y2="468" stroke="#687395" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  <text x="458" y="460" font-size="8" fill="#687395" text-anchor="end">Referer-Analyse</text>

  <!-- Arrowheads -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#687395"/>
    </marker>
    <marker id="arrowhead-flame" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ff9a22"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1a7a42"/>
    </marker>
  </defs>
</svg>
