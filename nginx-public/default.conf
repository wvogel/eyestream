map $arg_url $oembed_id {
  ~embed/(\d+)  $1;
  default       "";
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  autoindex off;

  include /etc/nginx/mime.types;

  types {
    video/mp4 m4s;
  }

  add_header Cache-Control "public, max-age=31536000, immutable";
  add_header Access-Control-Allow-Origin "*";
  error_page 404 /404.html;

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /favicon.ico {
    alias /etc/nginx/favicon.ico;
    add_header Cache-Control "public, max-age=86400";
  }

  location = /assets/flame-play.svg {
    alias /etc/nginx/assets/flame-play.svg;
    add_header Cache-Control "public, max-age=86400";
  }

  location = /404.html {
    alias /etc/nginx/errors/404.html;
    internal;
    add_header Cache-Control "no-store";
  }

  location = /oembed {
    if ($oembed_id = "") {
      return 400 '{"error":"url parameter required"}';
    }
    default_type application/json;
    add_header Cache-Control "public, max-age=3600";
    add_header Access-Control-Allow-Origin "*";
    return 200 '{"type":"video","version":"1.0","provider_name":"Eyestream","provider_url":"$scheme://$host","thumbnail_url":"$scheme://$host/$oembed_id/poster.jpg","thumbnail_width":1280,"html":"<iframe src=\\"$scheme://$host/embed/$oembed_id\\" width=\\"640\\" height=\\"360\\" frameborder=\\"0\\" allowfullscreen></iframe>","width":640,"height":360}';
  }

  location ~ ^/embed/\d+$ {
    alias /etc/nginx/embed.html;
    default_type text/html;
    add_header Cache-Control "no-cache";
    add_header Access-Control-Allow-Origin "*";
  }

  # Block access to disabled/hidden directories
  location ~ /\. {
    return 404;
  }

  location / {
    try_files $uri =404;
  }
}
