<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>Eyestream | Seite nicht gefunden</title>
  <style>
    :root {
      --bg: #f6f8ff;
      --bg-soft: #ffffff;
      --text: #12192d;
      --muted: #59617b;
      --line: rgba(28, 39, 71, 0.15);
      --glow: rgba(255, 110, 9, 0.25);
      --accent: #ff5b1a;
      --accent-2: #ffb000;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #070b16;
        --bg-soft: #101629;
        --text: #eef3ff;
        --muted: #a4b0cf;
        --line: rgba(188, 209, 255, 0.2);
        --glow: rgba(255, 114, 20, 0.35);
        --accent: #ff8b25;
        --accent-2: #ffd25d;
      }
    }
    [data-theme="light"] {
      --bg: #f6f8ff;
      --bg-soft: #ffffff;
      --text: #12192d;
      --muted: #59617b;
      --line: rgba(28, 39, 71, 0.15);
      --glow: rgba(255, 110, 9, 0.25);
      --accent: #ff5b1a;
      --accent-2: #ffb000;
    }
    [data-theme="dark"] {
      --bg: #070b16;
      --bg-soft: #101629;
      --text: #eef3ff;
      --muted: #a4b0cf;
      --line: rgba(188, 209, 255, 0.2);
      --glow: rgba(255, 114, 20, 0.35);
      --accent: #ff8b25;
      --accent-2: #ffd25d;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Avenir Next", "Nunito Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, var(--glow), transparent 42%),
        radial-gradient(circle at 80% 15%, rgba(66, 127, 255, 0.17), transparent 38%),
        linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 88%, black) 100%);
      overflow: hidden;
      transition: opacity 900ms ease, filter 900ms ease;
    }
    body.redirecting {
      opacity: 0;
      filter: blur(6px);
    }

    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .18;
      background-image:
        radial-gradient(circle at 25% 45%, rgba(255,255,255,.18) 0 1px, transparent 2px),
        radial-gradient(circle at 75% 10%, rgba(255,255,255,.12) 0 1px, transparent 2px);
      background-size: 44px 44px, 52px 52px;
      mix-blend-mode: soft-light;
    }

    .splash {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
      z-index: 10;
      animation: splashOut 1.1s ease 1.3s forwards;
    }
    .splash-logo {
      width: min(220px, 40vw);
      transform: scale(.86);
      filter: drop-shadow(0 12px 24px rgba(0,0,0,.25));
      animation: splashIn .9s cubic-bezier(.2,.9,.2,1) forwards;
    }
    @keyframes splashIn {
      from { opacity: 0; transform: translateY(14px) scale(.74); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes splashOut {
      to { opacity: 0; visibility: hidden; }
    }

    .wrap {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(920px, 100%);
      border: 1px solid var(--line);
      border-radius: 28px;
      background: color-mix(in srgb, var(--bg-soft) 86%, transparent);
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 60px rgba(0,0,0,.18);
      padding: clamp(20px, 4vw, 42px);
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: clamp(20px, 3vw, 40px);
      align-items: center;
      opacity: 0;
      transform: translateY(14px);
      animation: cardIn 1s ease 1.5s forwards;
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .visual {
      position: relative;
      display: grid;
      place-items: center;
    }
    .visual::before {
      content: "";
      position: absolute;
      width: min(360px, 90%);
      aspect-ratio: 1;
      border-radius: 50%;
      background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
      filter: blur(5px);
      animation: pulse 2.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: .75; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    .flame {
      width: min(204px, 48vw);
      max-width: 100%;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 12px 26px rgba(0,0,0,.28));
      animation: bob 4s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .meta h1 {
      margin: 0 0 8px;
      font-size: clamp(1.8rem, 4.5vw, 3.2rem);
      line-height: 1.05;
      letter-spacing: .01em;
    }
    .meta p {
      margin: 0 0 18px;
      font-size: clamp(1rem, 2vw, 1.18rem);
      color: var(--muted);
      line-height: 1.45;
    }
    .brand {
      display: inline-block;
      margin-bottom: 18px;
      text-decoration: none;
    }
    .brand img {
      height: 34px;
      width: auto;
      display: block;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    .btn {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font: inherit;
      cursor: pointer;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(115deg, var(--accent), var(--accent-2));
      box-shadow: 0 10px 24px rgba(255, 96, 21, 0.35);
    }
    .btn.secondary {
      color: var(--text);
      background: transparent;
      border: 1px solid var(--line);
      box-shadow: none;
    }
    .count {
      margin-top: 16px;
      color: var(--muted);
      font-size: .95rem;
    }

    @media (max-width: 860px) {
      .card {
        grid-template-columns: 1fr;
        text-align: center;
      }
      .actions { justify-content: center; }
      .brand { margin-inline: auto; }
    }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <div class="splash" aria-hidden="true">
    <img class="splash-logo" src="/assets/flame-play.svg" alt="">
  </div>

  <main class="wrap">
    <section class="card">
      <div class="visual">
        <img class="flame" src="/assets/flame-play.svg" alt="Eyestream Flame Icon">
      </div>
      <div class="meta">
        <h1>Eyestream</h1>
        <p>
          Diese Adresse hat gerade keinen Treffer gefunden.
        </p>
      </div>
    </section>
  </main>

</body>
</html>
