name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: eyestream
          POSTGRES_USER: eyestream
          POSTGRES_PASSWORD: eyestream
        options: >-
          --health-cmd "pg_isready -U eyestream"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pyyaml psycopg[binary] psycopg-pool psutil
          pip install -r tests/requirements-test.txt

      - name: Create writable data dirs
        run: |
          mkdir -p /tmp/uploads /tmp/hls
          echo "UPLOAD_DIR=/tmp/uploads" >> "$GITHUB_ENV"
          echo "HLS_DIR=/tmp/hls" >> "$GITHUB_ENV"

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: eyestream
          DB_USER: eyestream
          DB_PASSWORD: eyestream
        run: pytest tests/ -v
