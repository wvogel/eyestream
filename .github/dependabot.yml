version: 2
updates:
  - package-ecosystem: pip
    directory: "/app"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python

  - package-ecosystem: pip
    directory: "/tests"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - python
      - tests

  - package-ecosystem: docker
    directory: "/app"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    ignore:
      # Python 3.14 incompatible with Jinja2 3.1.6 (TypeError in template cache)
      - dependency-name: "python"
        versions: ["3.14", "3.14-slim"]

  - package-ecosystem: docker
    directory: "/worker"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    ignore:
      - dependency-name: "python"
        versions: ["3.14", "3.14-slim"]

  - package-ecosystem: docker-compose
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
