version: 2
updates:
  - package-ecosystem: pip
    directory: "/app"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    groups:
      python-security:
        applies-to: security-updates
        patterns: ["*"]
      python-minor-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: "/tests"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - python
      - tests
    groups:
      tests-security:
        applies-to: security-updates
        patterns: ["*"]
      tests-minor-patch:
        applies-to: version-updates
        patterns: ["*"]
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: "/app"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    groups:
      app-docker:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: "/worker"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    groups:
      worker-docker:
        patterns: ["*"]

  - package-ecosystem: docker-compose
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - docker
    groups:
      compose:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns: ["*"]
